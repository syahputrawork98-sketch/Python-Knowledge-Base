<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Backward Compatibility and PEPs</title>
  <desc id="desc">Timeline from proposal to deprecation and safe migration.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#0f172a">CORE-02-10 Backward Compatibility and PEPs</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">🛣️ Perubahan bahasa/API harus lewat proposal, transisi deprecation, dan migrasi bertahap.</text>
  <line x1="120" y1="360" x2="1080" y2="360" stroke="#475569" stroke-width="8"/>
  <circle cx="200" cy="360" r="48" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="173" y="366" font-family="Segoe UI, Arial" font-size="16" font-weight="700" fill="#1e3a8a">Need</text>
  <circle cx="430" cy="360" r="48" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="404" y="366" font-family="Segoe UI, Arial" font-size="16" font-weight="700" fill="#92400e">PEP</text>
  <circle cx="660" cy="360" r="48" fill="#fee2e2" stroke="#b91c1c" stroke-width="3"/>
  <text x="620" y="366" font-family="Segoe UI, Arial" font-size="16" font-weight="700" fill="#7f1d1d">Deprecate</text>
  <circle cx="890" cy="360" r="48" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
  <text x="853" y="366" font-family="Segoe UI, Arial" font-size="16" font-weight="700" fill="#14532d">Migrate</text>
  <rect x="140" y="450" width="910" height="150" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="170" y="495" font-family="Segoe UI, Arial" font-size="18" fill="#334155">- perubahan tidak diputus mendadak</text>
  <text x="170" y="523" font-family="Segoe UI, Arial" font-size="18" fill="#334155">- warning deprecation harus eksplisit dan bisa ditindaklanjuti</text>
  <text x="170" y="551" font-family="Segoe UI, Arial" font-size="18" fill="#334155">- release note + migration guide wajib tersedia</text>
</svg>



