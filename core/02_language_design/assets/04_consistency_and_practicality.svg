<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Consistency and Practicality</title>
  <desc id="desc">Balance between team consistency and practical constraints.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#0f172a">CORE-02-04 Consistency and Practicality</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">⚖️ Standar tim harus konsisten, tetapi keputusan tetap memperhatikan konteks nyata.</text>
  <rect x="170" y="250" width="270" height="150" rx="16" fill="#e0e7ff" stroke="#4338ca"/>
  <text x="195" y="290" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#312e81">Consistency</text>
  <text x="195" y="322" font-family="Segoe UI, Arial" font-size="16" fill="#312e81">- naming pattern</text>
  <text x="195" y="348" font-family="Segoe UI, Arial" font-size="16" fill="#312e81">- struktur fungsi</text>
  <rect x="760" y="250" width="270" height="150" rx="16" fill="#dcfce7" stroke="#15803d"/>
  <text x="785" y="290" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#14532d">Practicality</text>
  <text x="785" y="322" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- batas waktu</text>
  <text x="785" y="348" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- kebutuhan operasi</text>
  <line x1="270" y1="430" x2="930" y2="430" stroke="#0f172a" stroke-width="10"/>
  <line x1="600" y1="430" x2="600" y2="260" stroke="#0f172a" stroke-width="8"/>
  <polygon points="600,260 535,330 665,330" fill="#334155"/>
  <rect x="470" y="345" width="260" height="110" rx="14" fill="#ffffff" stroke="#94a3b8"/>
  <text x="493" y="382" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#334155">Operational Decision</text>
  <text x="493" y="408" font-family="Segoe UI, Arial" font-size="15" fill="#334155">exceptions terdokumentasi</text>
  <text x="493" y="430" font-family="Segoe UI, Arial" font-size="15" fill="#334155">tanpa merusak standar utama</text>
  <rect x="70" y="540" width="1060" height="100" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="95" y="580" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#0f172a">Learning Target: konsisten by default, fleksibel saat ada alasan operasional yang jelas.</text>
</svg>



