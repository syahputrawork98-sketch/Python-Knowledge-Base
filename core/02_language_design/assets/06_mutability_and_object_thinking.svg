<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Mutability and Object Thinking visual map</title>
  <desc id="desc">Core language design chapter map for Mutability and Object Thinking.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <text x="80" y="86" font-size="38" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial">Mutability and Object Thinking</text>
  <text x="80" y="122" font-size="20" fill="#334155" font-family="Segoe UI, Arial">CORE-02-06 | Language Design Map</text>

  <rect x="80" y="220" rx="20" ry="20" width="300" height="210" fill="url(#card1)"/>
  <rect x="450" y="220" rx="20" ry="20" width="300" height="210" fill="url(#card2)"/>
  <rect x="820" y="220" rx="20" ry="20" width="300" height="210" fill="url(#card1)"/>

  <text x="112" y="278" font-size="24" fill="#ffffff" font-family="Segoe UI, Arial">1. Object State</text>
  <text x="482" y="278" font-size="24" fill="#ffffff" font-family="Segoe UI, Arial">2. Side Effects</text>
  <text x="852" y="278" font-size="24" fill="#ffffff" font-family="Segoe UI, Arial">3. Safe API Design</text>

  <line x1="380" y1="325" x2="450" y2="325" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="750" y1="325" x2="820" y2="325" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="80" y="500" width="1040" height="120" rx="18" ry="18" fill="#ffffff" opacity="0.94"/>
  <text x="115" y="548" font-size="24" fill="#0f172a" font-family="Segoe UI, Arial">Learning Target</text>
  <text x="115" y="584" font-size="18" fill="#334155" font-family="Segoe UI, Arial">Control shared state and define mutation behavior explicitly in APIs.</text>
</svg>
