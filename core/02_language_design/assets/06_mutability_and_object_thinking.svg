<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Mutability and Object Thinking</title>
  <desc id="desc">Object reference and mutation impact on side effects.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#0f172a">CORE-02-06 Mutability and Object Thinking</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">🧠 Satu objek bisa diakses banyak referensi; keputusan mutate/copy menentukan side effect.</text>
  <rect x="120" y="230" width="220" height="120" rx="14" fill="#e2e8f0" stroke="#475569"/>
  <text x="154" y="282" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#1e293b">ref_a</text>
  <rect x="120" y="390" width="220" height="120" rx="14" fill="#e2e8f0" stroke="#475569"/>
  <text x="154" y="442" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#1e293b">ref_b</text>
  <circle cx="580" cy="370" r="120" fill="#dbeafe" stroke="#1d4ed8" stroke-width="4"/>
  <text x="532" y="366" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#1e3a8a">shared</text>
  <text x="542" y="392" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#1e3a8a">object</text>
  <line x1="340" y1="290" x2="470" y2="330" stroke="#475569" stroke-width="4"/>
  <line x1="340" y1="450" x2="470" y2="410" stroke="#475569" stroke-width="4"/>
  <rect x="790" y="230" width="320" height="120" rx="14" fill="#dcfce7" stroke="#15803d"/>
  <text x="816" y="278" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#14532d">Mutate in-place</text>
  <text x="816" y="304" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">cepat, tapi risiko side effect</text>
  <rect x="790" y="390" width="320" height="120" rx="14" fill="#fef3c7" stroke="#d97706"/>
  <text x="816" y="438" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#92400e">Copy before change</text>
  <text x="816" y="464" font-family="Segoe UI, Arial" font-size="16" fill="#92400e">lebih aman, ada biaya memori</text>
  <line x1="700" y1="330" x2="790" y2="290" stroke="#475569" stroke-width="4"/>
  <line x1="700" y1="410" x2="790" y2="450" stroke="#475569" stroke-width="4"/>
</svg>



