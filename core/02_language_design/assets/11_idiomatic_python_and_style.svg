<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Idiomatic Python and Style</title>
  <desc id="desc">From style principles to team collaboration quality.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#0f172a">CORE-02-11 Idiomatic Python and Style</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">✨ Style idiomatic meningkatkan readability, review speed, dan kolaborasi tim.</text>
  <rect x="120" y="210" width="300" height="360" rx="18" fill="#e0e7ff" stroke="#4338ca"/>
  <text x="145" y="255" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#312e81">Style Principles</text>
  <text x="145" y="290" font-family="Segoe UI, Arial" font-size="16" fill="#312e81">- naming jelas</text>
  <text x="145" y="316" font-family="Segoe UI, Arial" font-size="16" fill="#312e81">- flow sederhana</text>
  <text x="145" y="342" font-family="Segoe UI, Arial" font-size="16" fill="#312e81">- gunakan idiom secukupnya</text>
  <rect x="470" y="210" width="300" height="360" rx="18" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="495" y="255" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#1e3a8a">Code Structure</text>
  <text x="495" y="290" font-family="Segoe UI, Arial" font-size="16" fill="#1e3a8a">- fungsi kecil fokus</text>
  <text x="495" y="316" font-family="Segoe UI, Arial" font-size="16" fill="#1e3a8a">- error handling jelas</text>
  <text x="495" y="342" font-family="Segoe UI, Arial" font-size="16" fill="#1e3a8a">- konsisten lintas modul</text>
  <rect x="820" y="210" width="300" height="360" rx="18" fill="#dcfce7" stroke="#15803d"/>
  <text x="845" y="255" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#14532d">Team Outcome</text>
  <text x="845" y="290" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- review lebih cepat</text>
  <text x="845" y="316" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- onboarding lebih mudah</text>
  <text x="845" y="342" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- refactor lebih aman</text>
  <line x1="420" y1="390" x2="470" y2="390" stroke="#475569" stroke-width="4"/>
  <line x1="770" y1="390" x2="820" y2="390" stroke="#475569" stroke-width="4"/>
</svg>



