<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Duck Typing and Protocols</title>
  <desc id="desc">Behavior contract enables interchangeable implementations.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#0f172a">CORE-02-07 Duck Typing and Protocols</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">🦆 Fokus pada perilaku yang dibutuhkan, bukan jenis class konkret.</text>
  <rect x="430" y="180" width="340" height="150" rx="16" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="468" y="226" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#1e3a8a">Protocol Contract</text>
  <text x="468" y="254" font-family="Segoe UI, Arial" font-size="16" fill="#1e3a8a">requires: .read() and .write()</text>
  <text x="468" y="280" font-family="Segoe UI, Arial" font-size="16" fill="#1e3a8a">behavior over concrete type</text>
  <rect x="130" y="420" width="260" height="150" rx="14" fill="#dcfce7" stroke="#15803d"/>
  <text x="164" y="470" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#14532d">FileAdapter</text>
  <text x="164" y="496" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">implements contract</text>
  <rect x="470" y="420" width="260" height="150" rx="14" fill="#dcfce7" stroke="#15803d"/>
  <text x="502" y="470" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#14532d">MemoryBuffer</text>
  <text x="502" y="496" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">implements contract</text>
  <rect x="810" y="420" width="260" height="150" rx="14" fill="#dcfce7" stroke="#15803d"/>
  <text x="842" y="470" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#14532d">MockObject</text>
  <text x="842" y="496" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">implements contract</text>
  <line x1="500" y1="330" x2="260" y2="420" stroke="#475569" stroke-width="4"/>
  <line x1="600" y1="330" x2="600" y2="420" stroke="#475569" stroke-width="4"/>
  <line x1="700" y1="330" x2="940" y2="420" stroke="#475569" stroke-width="4"/>
