<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Batteries Included Mindset</title>
  <desc id="desc">Decision gate between stdlib-first and external dependencies.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#0f172a">CORE-02-09 Batteries Included Mindset</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">🔋 Prioritaskan stdlib, adopsi dependency eksternal saat ada alasan teknis yang kuat.</text>
  <rect x="80" y="250" width="300" height="170" rx="16" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="105" y="300" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#1e3a8a">Kebutuhan Fitur</text>
  <text x="105" y="328" font-family="Segoe UI, Arial" font-size="16" fill="#1e3a8a">contoh: parsing, HTTP, data format</text>
  <polygon points="460,230 740,230 820,335 740,440 460,440 380,335" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="470" y="305" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#92400e">Gate Evaluasi</text>
  <text x="470" y="334" font-family="Segoe UI, Arial" font-size="16" fill="#92400e">cukup dengan stdlib?</text>
  <text x="470" y="360" font-family="Segoe UI, Arial" font-size="16" fill="#92400e">biaya vs manfaat package luar?</text>
  <rect x="860" y="190" width="270" height="120" rx="14" fill="#dcfce7" stroke="#15803d"/>
  <text x="886" y="238" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#14532d">Pilih Stdlib</text>
  <text x="886" y="264" font-family="Segoe UI, Arial" font-size="15" fill="#14532d">lebih sedikit dependency</text>
  <rect x="860" y="360" width="270" height="120" rx="14" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="886" y="408" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#7f1d1d">Pilih External</text>
  <text x="886" y="434" font-family="Segoe UI, Arial" font-size="15" fill="#7f1d1d">jika nilai tambah jelas</text>
  <line x1="380" y1="335" x2="460" y2="335" stroke="#475569" stroke-width="4"/>
  <line x1="820" y1="300" x2="860" y2="250" stroke="#475569" stroke-width="4"/>
  <line x1="820" y1="370" x2="860" y2="420" stroke="#475569" stroke-width="4"/>
</svg>



