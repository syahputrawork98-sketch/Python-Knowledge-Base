<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Design Goals and Philosophy</title>
  <desc id="desc">Map from language design goals to coding consequences.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#0f172a">CORE-02-01 Design Goals and Philosophy</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">🎯 Tujuan desain -> prinsip filosofi -> keputusan coding harian</text>
  <circle cx="600" cy="320" r="120" fill="#dbeafe" stroke="#1d4ed8" stroke-width="4"/>
  <text x="545" y="300" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#1e3a8a">Python</text>
  <text x="536" y="332" font-family="Segoe UI, Arial" font-size="18" fill="#1e3a8a">Readable</text>
  <text x="542" y="358" font-family="Segoe UI, Arial" font-size="18" fill="#1e3a8a">Practical</text>
  <rect x="120" y="210" width="260" height="170" rx="18" fill="#e0e7ff" stroke="#4338ca"/>
  <text x="142" y="250" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#312e81">Design Goals</text>
  <text x="142" y="282" font-family="Segoe UI, Arial" font-size="16" fill="#312e81">- clarity first</text>
  <text x="142" y="308" font-family="Segoe UI, Arial" font-size="16" fill="#312e81">- low surprise</text>
  <text x="142" y="334" font-family="Segoe UI, Arial" font-size="16" fill="#312e81">- productive defaults</text>
  <rect x="820" y="210" width="260" height="170" rx="18" fill="#dcfce7" stroke="#15803d"/>
  <text x="842" y="250" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#14532d">Coding Decisions</text>
  <text x="842" y="282" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- descriptive naming</text>
  <text x="842" y="308" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- small functions</text>
  <text x="842" y="334" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- explicit intent</text>
  <line x1="380" y1="295" x2="480" y2="305" stroke="#475569" stroke-width="3"/>
  <line x1="720" y1="305" x2="820" y2="295" stroke="#475569" stroke-width="3"/>
  <rect x="70" y="500" width="1060" height="130" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="95" y="545" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#0f172a">Learning Target</text>
  <text x="95" y="578" font-family="Segoe UI, Arial" font-size="18" fill="#334155">Memahami alasan filosofi Python agar keputusan desain kode konsisten dan mudah dirawat.</text>
</svg>



