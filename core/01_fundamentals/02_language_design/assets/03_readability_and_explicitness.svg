<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Readability and Explicitness</title>
  <desc id="desc">Triangle map linking intent, explicit code, and maintenance quality.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#0f172a">CORE-02-03 Readability and Explicitness</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">📖 Intent bisnis -> desain kode explicit -> maintainability</text>
  <polygon points="600,180 330,470 870,470" fill="#e2e8f0" stroke="#475569" stroke-width="3"/>
  <circle cx="600" cy="180" r="56" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="548" y="186" font-family="Segoe UI, Arial" font-size="19" font-weight="700" fill="#1e3a8a">Intent</text>
  <circle cx="330" cy="470" r="64" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="274" y="466" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#14532d">Explicit</text>
  <text x="272" y="490" font-family="Segoe UI, Arial" font-size="15" fill="#14532d">contract</text>
  <circle cx="870" cy="470" r="64" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="815" y="466" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#7f1d1d">Maintain</text>
  <text x="820" y="490" font-family="Segoe UI, Arial" font-size="15" fill="#7f1d1d">quality</text>
  <rect x="455" y="280" width="290" height="140" rx="14" fill="#ffffff" stroke="#94a3b8"/>
  <text x="478" y="318" font-family="Segoe UI, Arial" font-size="16" fill="#334155">- nama fungsi jelas</text>
  <text x="478" y="344" font-family="Segoe UI, Arial" font-size="16" fill="#334155">- parameter tidak ambigu</text>
  <text x="478" y="370" font-family="Segoe UI, Arial" font-size="16" fill="#334155">- error message informatif</text>
  <rect x="70" y="540" width="1060" height="100" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="95" y="580" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#0f172a">Learning Target: kode mudah dipahami manusia tanpa menebak intent.</text>
</svg>



