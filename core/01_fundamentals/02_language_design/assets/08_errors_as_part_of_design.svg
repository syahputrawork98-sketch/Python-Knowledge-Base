<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Errors as Part of Design</title>
  <desc id="desc">Pipeline from validation to error contract and reliable response.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#0f172a">CORE-02-08 Errors as Part of Design</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">🚨 Error bukan kebocoran, tapi bagian dari kontrak API yang harus didesain.</text>
  <rect x="90" y="250" width="250" height="170" rx="16" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="118" y="300" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#1e3a8a">1. Validate Input</text>
  <text x="118" y="328" font-family="Segoe UI, Arial" font-size="16" fill="#1e3a8a">deteksi error awal</text>
  <rect x="475" y="250" width="250" height="170" rx="16" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="503" y="300" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#7f1d1d">2. Raise Specific</text>
  <text x="503" y="328" font-family="Segoe UI, Arial" font-size="16" fill="#7f1d1d">type + pesan jelas</text>
  <rect x="860" y="250" width="250" height="170" rx="16" fill="#dcfce7" stroke="#15803d"/>
  <text x="888" y="300" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#14532d">3. Handle and Report</text>
  <text x="888" y="328" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">respons aman dan stabil</text>
  <line x1="340" y1="335" x2="475" y2="335" stroke="#475569" stroke-width="4"/>
  <line x1="725" y1="335" x2="860" y2="335" stroke="#475569" stroke-width="4"/>
  <rect x="70" y="500" width="1060" height="130" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="95" y="545" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#0f172a">Learning Target</text>
  <text x="95" y="578" font-family="Segoe UI, Arial" font-size="18" fill="#334155">Mendesain error path agar debugging, testing, dan integrasi lintas modul lebih andal.</text>
</svg>



