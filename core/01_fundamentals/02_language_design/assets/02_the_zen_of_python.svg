<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">The Zen of Python</title>
  <desc id="desc">Aphorisms as a filter to choose better implementation.</desc>
  <rect width="1200" height="700" fill="#f1f5f9"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#0f172a">CORE-02-02 The Zen of Python</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">🧭 Aphorism Zen dipakai sebagai kompas keputusan implementasi</text>
  <rect x="95" y="190" width="300" height="260" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="118" y="232" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#92400e">Zen Compass</text>
  <text x="118" y="266" font-family="Segoe UI, Arial" font-size="16" fill="#92400e">- Explicit is better</text>
  <text x="118" y="292" font-family="Segoe UI, Arial" font-size="16" fill="#92400e">- Simple is better</text>
  <text x="118" y="318" font-family="Segoe UI, Arial" font-size="16" fill="#92400e">- Errors should not pass silently</text>
  <polygon points="510,220 760,220 700,430 570,430" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="570" y="278" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#1e3a8a">Filter Opsi</text>
  <text x="570" y="310" font-family="Segoe UI, Arial" font-size="16" fill="#1e3a8a">Cek readability</text>
  <text x="570" y="336" font-family="Segoe UI, Arial" font-size="16" fill="#1e3a8a">Cek explicit intent</text>
  <text x="570" y="362" font-family="Segoe UI, Arial" font-size="16" fill="#1e3a8a">Cek maintainability</text>
  <rect x="825" y="190" width="290" height="260" rx="18" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="848" y="232" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#14532d">Outcome Kode</text>
  <text x="848" y="266" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- lebih konsisten</text>
  <text x="848" y="292" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- lebih mudah review</text>
  <text x="848" y="318" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- lebih mudah dipelihara</text>
  <line x1="395" y1="320" x2="510" y2="320" stroke="#475569" stroke-width="3"/>
  <line x1="760" y1="320" x2="825" y2="320" stroke="#475569" stroke-width="3"/>
  <rect x="70" y="500" width="1060" height="130" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="95" y="545" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#0f172a">Learning Target</text>
  <text x="95" y="578" font-family="Segoe UI, Arial" font-size="18" fill="#334155">Mampu memakai prinsip Zen sebagai aturan keputusan saat ada beberapa opsi implementasi.</text>
</svg>



