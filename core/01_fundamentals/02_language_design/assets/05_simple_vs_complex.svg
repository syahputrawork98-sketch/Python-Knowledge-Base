<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Simple vs Complex</title>
  <desc id="desc">Decision tree from real needs to justified complexity.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#0f172a">CORE-02-05 Simple vs Complex</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">🪜 Mulai dari solusi sederhana, naik kompleksitas hanya jika kebutuhan membuktikan perlu.</text>
  <rect x="460" y="170" width="280" height="90" rx="14" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="500" y="225" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#1e3a8a">Kebutuhan Nyata</text>
  <line x1="600" y1="260" x2="600" y2="320" stroke="#475569" stroke-width="4"/>
  <rect x="420" y="320" width="360" height="100" rx="14" fill="#fef3c7" stroke="#d97706"/>
  <text x="455" y="365" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#92400e">Evaluasi Biaya vs Manfaat</text>
  <line x1="520" y1="420" x2="330" y2="500" stroke="#475569" stroke-width="4"/>
  <line x1="680" y1="420" x2="870" y2="500" stroke="#475569" stroke-width="4"/>
  <rect x="140" y="500" width="360" height="130" rx="14" fill="#dcfce7" stroke="#15803d"/>
  <text x="170" y="542" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#14532d">Pilih Simple</text>
  <text x="170" y="570" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- cepat dipahami</text>
  <text x="170" y="594" font-family="Segoe UI, Arial" font-size="16" fill="#14532d">- test dan refactor mudah</text>
  <rect x="700" y="500" width="360" height="130" rx="14" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="730" y="542" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#7f1d1d">Naik ke Complex</text>
  <text x="730" y="570" font-family="Segoe UI, Arial" font-size="16" fill="#7f1d1d">hanya jika dibutuhkan oleh skala/fitur</text>
  <text x="730" y="594" font-family="Segoe UI, Arial" font-size="16" fill="#7f1d1d">dan trade-offnya terdokumentasi</text>
</svg>



