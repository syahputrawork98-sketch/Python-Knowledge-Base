<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Language Design Tradeoffs</title>
  <desc id="desc">Tradeoff matrix showing competing but valid values.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#0f172a">CORE-02-12 Language Design Tradeoffs</text>
  <text x="70" y="106" font-family="Segoe UI, Arial" font-size="18" fill="#334155">🎚️ Keputusan desain bergerak di antara nilai yang sama-sama valid, bukan benar vs salah.</text>
  <rect x="180" y="180" width="840" height="420" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
  <line x1="600" y1="180" x2="600" y2="600" stroke="#94a3b8" stroke-width="2"/>
  <line x1="180" y1="390" x2="1020" y2="390" stroke="#94a3b8" stroke-width="2"/>
  <text x="265" y="220" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#1e3a8a">Readability</text>
  <text x="705" y="220" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#7f1d1d">Performance</text>
  <text x="265" y="560" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#14532d">Safety</text>
  <text x="735" y="560" font-family="Segoe UI, Arial" font-size="21" font-weight="700" fill="#92400e">Compatibility</text>
  <circle cx="610" cy="385" r="42" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="583" y="392" font-family="Segoe UI, Arial" font-size="16" font-weight="700" fill="#1e3a8a">Context</text>
  <text x="230" y="305" font-family="Segoe UI, Arial" font-size="16" fill="#334155">contoh: code clarity, API ergonomics</text>
  <text x="640" y="305" font-family="Segoe UI, Arial" font-size="16" fill="#334155">contoh: latency, resource usage</text>
  <text x="230" y="470" font-family="Segoe UI, Arial" font-size="16" fill="#334155">contoh: fail loudly, strict contract</text>
  <text x="640" y="470" font-family="Segoe UI, Arial" font-size="16" fill="#334155">contoh: deprecation path bertahap</text>
</svg>



