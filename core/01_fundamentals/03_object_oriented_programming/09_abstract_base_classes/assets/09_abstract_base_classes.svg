<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />
  
  <!-- Title & Subtitle -->
  <text x="400" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#1e293b" font-weight="bold" text-anchor="middle">Abstract Base Classes (Kontrak)</text>
  <text x="400" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#64748b" font-style="italic" text-anchor="middle">Memaksa Kelas Anak Mengikuti Standar yang Ditentukan</text>

  <!-- THE CONTRACT (Abstract Class) -->
  <g transform="translate(250, 140)">
    <rect x="-10" y="0" width="320" height="180" rx="10" fill="#fef3c7" opacity="0.6" />
    <!-- Formal Contract Paper -->
    <rect x="0" y="10" width="300" height="160" rx="5" fill="white" stroke="#d97706" stroke-width="4" />
    <!-- Stamp Seal -->
    <circle cx="240" cy="120" r="30" fill="#fecaca" opacity="0.6" stroke="#ef4444" stroke-width="2" />
    <text x="240" y="125" font-family="'Segoe UI', Arial" font-size="10" fill="#b91c1c" font-weight="bold" text-anchor="middle">OFFICIAL</text>
    <text x="240" y="135" font-family="'Segoe UI', Arial" font-size="8" fill="#b91c1c" text-anchor="middle">ABC CONTRACT</text>

    <text x="150" y="45" font-family="'Segoe UI', Arial" font-size="18" fill="#92400e" font-weight="bold" text-anchor="middle">PaymentGateway (ABC)</text>
    <line x1="30" y1="60" x2="270" y2="60" stroke="#fbbf24" stroke-width="2" />

    <!-- Abstract Methods (The Clauses) -->
    <g transform="translate(30, 80)">
      <text x="0" y="10" font-family="'Courier New', monospace" font-size="14" fill="#b45309" font-weight="bold">@abstractmethod</text>
      <text x="0" y="30" font-family="'Courier New', monospace" font-size="14" fill="#b45309" font-weight="bold">def proses_bayar(self):</text>
      
      <text x="0" y="60" font-family="'Courier New', monospace" font-size="14" fill="#64748b" font-style="italic">"Wajib ada di kelas anak!"</text>
    </g>
  </g>

  <!-- BRANCHING LINES -->
  <g stroke="#94a3b8" stroke-width="3" fill="none">
    <path d="M 400 320 L 400 370" />
    <path d="M 400 370 L 220 370 L 220 400" marker-end="url(#arrow)" />
    <path d="M 400 370 L 580 370 L 580 400" marker-end="url(#arrow)" />
  </g>

  <!-- CHILD 1: SUCCESSFUL IMPLEMENTATION -->
  <g transform="translate(110, 410)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="white" stroke="#10b981" stroke-width="3" />
    <rect x="0" y="0" width="220" height="35" rx="10" fill="#10b981" />
    <rect x="0" y="20" width="220" height="15" fill="#10b981" />
    <text x="110" y="22" font-family="'Segoe UI', Arial" font-size="16" fill="white" font-weight="bold" text-anchor="middle">ShopeePay (Valid)</text>
    
    <text x="20" y="70" font-family="'Courier New', monospace" font-size="12" fill="#065f46" font-weight="bold">def proses_bayar(self):</text>
    <text x="40" y="90" font-family="'Courier New', monospace" font-size="12" fill="#059669"># OK! Syarat terpenuhi</text>
    
    <!-- Checklist -->
    <circle cx="200" cy="70" r="12" fill="#dcfce7" />
    <path d="M 194 70 L 198 74 L 206 66" fill="none" stroke="#16a34a" stroke-width="2" />
  </g>

  <!-- CHILD 2: FAILED IMPLEMENTATION -->
  <g transform="translate(470, 410)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="white" stroke="#ef4444" stroke-width="3" />
    <rect x="0" y="0" width="220" height="35" rx="10" fill="#ef4444" />
    <rect x="0" y="20" width="220" height="15" fill="#ef4444" />
    <text x="110" y="22" font-family="'Segoe UI', Arial" font-size="16" fill="white" font-weight="bold" text-anchor="middle">Gopay (Error)</text>
    
    <text x="20" y="70" font-family="'Courier New', monospace" font-size="12" fill="#991b1b" font-weight="bold"># Lupa membuat</text>
    <text x="20" y="90" font-family="'Courier New', monospace" font-size="12" fill="#991b1b" font-weight="bold"># proses_bayar()</text>
    
    <!-- Cross -->
    <circle cx="200" cy="70" r="12" fill="#fee2e2" />
    <path d="M 194 64 L 206 76 M 206 64 L 194 76" stroke="#b91c1c" stroke-width="2" />

    <text x="110" y="110" font-family="'Segoe UI', Arial" font-size="11" fill="#b91c1c" font-weight="bold" text-anchor="middle">TypeError: Can't instantiate!</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Footer -->
  <text x="400" y="580" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">© Python Knowledge Universe - Bab 09: Abstract Base Classes</text>
</svg>