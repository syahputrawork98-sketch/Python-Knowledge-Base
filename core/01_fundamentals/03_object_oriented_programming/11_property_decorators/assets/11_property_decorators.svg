<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />
  
  <!-- Title & Subtitle -->
  <text x="400" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#1e293b" font-weight="bold" text-anchor="middle">Property Decorators (@property)</text>
  <text x="400" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#64748b" font-style="italic" text-anchor="middle">Ilusi Atribut Biasa yang Menjalankan Logika Fungsi</text>

  <!-- EXTERNAL USER PERCEPTION -->
  <g transform="translate(100, 200)">
    <rect x="-10" y="-10" width="180" height="200" rx="15" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
    <circle cx="80" cy="50" r="30" fill="#cbd5e1" />
    <path d="M 65 50 L 75 60 L 95 40" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" />
    
    <text x="80" y="100" font-family="'Segoe UI', Arial" font-size="16" fill="#475569" font-weight="bold" text-anchor="middle">User Luar</text>
    
    <rect x="20" y="120" width="120" height="40" rx="5" fill="white" stroke="#3b82f6" stroke-width="2" />
    <text x="80" y="145" font-family="'Courier New', monospace" font-size="13" fill="#1e40af" font-weight="bold" text-anchor="middle">obj.suhu = 30</text>
    
    <text x="80" y="175" font-family="'Segoe UI', Arial" font-size="11" fill="#64748b" text-anchor="middle">"Terlihat seperti variabel"</text>
  </g>

  <!-- THE MAGIC MIRROR / FACADE -->
  <g transform="translate(320, 150)">
    <!-- Glass Shield -->
    <rect x="0" y="0" width="120" height="300" rx="10" fill="#bae6fd" opacity="0.4" stroke="#38bdf8" stroke-width="4" stroke-dasharray="10,5" />
    <!-- Magnifying Glass Effect -->
    <circle cx="60" cy="150" r="40" fill="#7dd3fc" opacity="0.6" stroke="white" stroke-width="3" />
    <line x1="60" y1="190" x2="100" y2="250" stroke="white" stroke-width="8" stroke-linecap="round" />
    
    <text x="60" y="-20" font-family="'Segoe UI', Arial" font-size="14" fill="#0284c7" font-weight="bold" text-anchor="middle">@property</text>
    <text x="60" y="325" font-family="'Segoe UI', Arial" font-size="14" fill="#0284c7" font-weight="bold" text-anchor="middle">@suhu.setter</text>
  </g>

  <!-- ARROW THROUGH GLASS -->
  <path d="M 270 300 L 480 300" stroke="#3b82f6" stroke-width="4" stroke-dasharray="10,5" marker-end="url(#arrowblue)" />

  <!-- REALITY: INTERNAL LOGIC -->
  <g transform="translate(520, 180)">
    <rect x="-10" y="-10" width="220" height="240" rx="15" fill="white" stroke="#22c55e" stroke-width="3" />
    
    <!-- Validation Logic -->
    <g transform="translate(10, 20)">
      <rect x="0" y="0" width="180" height="60" rx="5" fill="#f0fdf4" stroke="#10b981" stroke-width="1" />
      <text x="10" y="25" font-family="'Courier New', monospace" font-size="12" fill="#14532d" font-weight="bold">If suhu &lt; -273:</text>
      <text x="25" y="45" font-family="'Courier New', monospace" font-size="12" fill="#15803d">raise ValueError!</text>
    </g>

    <!-- Internal storage -->
    <g transform="translate(10, 120)">
      <rect x="0" y="0" width="180" height="80" rx="10" fill="#334155" stroke="#0f172a" stroke-width="4" />
      <circle cx="30" cy="30" r="10" fill="#10b981" />
      <text x="90" y="35" font-family="'Courier New', monospace" font-size="14" fill="#f1f5f9" font-weight="bold" text-anchor="middle">self._suhu</text>
      <line x1="20" y1="55" x2="160" y2="55" stroke="#475569" stroke-width="2" />
      <text x="90" y="72" font-family="'Segoe UI', Arial" font-size="10" fill="#94a3b8" text-anchor="middle">Private Storage</text>
    </g>
    
    <text x="90" y="225" font-family="'Segoe UI', Arial" font-size="13" fill="#16a34a" font-weight="bold" text-anchor="middle">Tervalidasi di Belakang Layar</text>
  </g>

  <defs>
    <marker id="arrowblue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
    </marker>
  </defs>

  <!-- Footer -->
  <text x="400" y="580" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">© Python Knowledge Universe - Bab 11: Property Decorators</text>
</svg>