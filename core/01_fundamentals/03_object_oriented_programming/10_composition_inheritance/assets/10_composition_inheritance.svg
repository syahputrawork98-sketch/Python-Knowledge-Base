<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />
  
  <!-- Title & Subtitle -->
  <text x="400" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#1e293b" font-weight="bold" text-anchor="middle">Composition vs Inheritance</text>
  <text x="400" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#64748b" font-style="italic" text-anchor="middle">"HAS-A" (Rakitan) vs "IS-A" (Keturunan)</text>

  <!-- LEFT: INHERITANCE (IS-A) -->
  <g transform="translate(100, 150)">
    <text x="100" y="20" font-family="'Segoe UI', Arial" font-size="18" fill="#b91c1c" font-weight="bold" text-anchor="middle">Inheritance (IS-A)</text>
    
    <!-- Tree structure -->
    <rect x="50" y="40" width="100" height="40" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
    <text x="100" y="65" font-family="'Segoe UI', Arial" font-size="12" fill="#991b1b" font-weight="bold" text-anchor="middle">Induk (Mesin)</text>
    
    <path d="M 100 80 L 100 110 L 50 110 L 50 130" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowred)" />
    <path d="M 100 110 L 150 110 L 150 130" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowred)" />

    <rect x="10" y="130" width="80" height="40" rx="5" fill="#fecaca" stroke="#ef4444" stroke-width="2" />
    <text x="50" y="155" font-family="'Segoe UI', Arial" font-size="10" fill="#991b1b" text-anchor="middle">Mobil</text>
    
    <rect x="110" y="130" width="80" height="40" rx="5" fill="#fecaca" stroke="#ef4444" stroke-width="2" />
    <text x="150" y="155" font-family="'Segoe UI', Arial" font-size="10" fill="#991b1b" text-anchor="middle">Motor</text>
    
    <!-- Bad side effect -->
    <rect x="20" y="200" width="160" height="80" rx="5" fill="#fff1f2" stroke="#e11d48" stroke-width="1" stroke-dasharray="5,5" />
    <text x="100" y="225" font-family="'Segoe UI', Arial" font-size="11" fill="#e11d48" text-anchor="middle">Kaku: Perubahan di Induk</text>
    <text x="100" y="240" font-family="'Segoe UI', Arial" font-size="11" fill="#e11d48" text-anchor="middle">berimbas ke SEMUA anak</text>
    <text x="100" y="260" font-family="'Segoe UI', Arial" font-size="12" fill="#e11d48" font-weight="bold" text-anchor="middle">"Fragile Base Class"</text>
  </g>

  <!-- MIDDLE DIVIDER -->
  <line x1="400" y1="130" x2="400" y2="520" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="10,5" />

  <!-- RIGHT: COMPOSITION (HAS-A) -->
  <g transform="translate(450, 150)">
    <text x="125" y="20" font-family="'Segoe UI', Arial" font-size="18" fill="#047857" font-weight="bold" text-anchor="middle">Composition (HAS-A)</text>
    
    <!-- Main Object (PC Assembly) -->
    <rect x="35" y="40" width="180" height="260" rx="15" fill="#ecfdf5" stroke="#10b981" stroke-width="3" />
    <text x="125" y="65" font-family="'Segoe UI', Arial" font-size="16" fill="#065f46" font-weight="bold" text-anchor="middle">PC Gaming</text>
    
    <!-- Components -->
    <g transform="translate(60, 90)">
      <rect x="0" y="0" width="130" height="40" rx="5" fill="white" stroke="#3b82f6" stroke-width="2" />
      <!-- Memory Icon -->
      <rect x="10" y="10" width="110" height="20" fill="#bfdbfe" />
      <text x="65" y="60" font-family="'Segoe UI', Arial" font-size="11" fill="#1e40af" text-anchor="middle">RAM (Has-A)</text>
    </g>

    <g transform="translate(60, 160)">
      <rect x="0" y="0" width="130" height="40" rx="5" fill="white" stroke="#ef4444" stroke-width="2" />
      <!-- GPU Icon -->
      <rect x="10" y="10" width="40" height="20" fill="#fecaca" />
      <rect x="60" y="10" width="60" height="20" fill="#fecaca" />
      <text x="65" y="60" font-family="'Segoe UI', Arial" font-size="11" fill="#991b1b" text-anchor="middle">GPU (Has-A)</text>
    </g>

    <g transform="translate(60, 230)">
      <rect x="0" y="0" width="130" height="40" rx="5" fill="white" stroke="#ca8a04" stroke-width="2" />
      <text x="65" y="60" font-family="'Segoe UI', Arial" font-size="11" fill="#854d0e" text-anchor="middle">CPU (Has-A)</text>
    </g>

    <!-- Good side effect -->
    <text x="125" y="340" font-family="'Segoe UI', Arial" font-size="13" fill="#059669" font-weight="bold" text-anchor="middle">Fleksibel &amp; Modular</text>
    <text x="125" y="355" font-family="'Segoe UI', Arial" font-size="11" fill="#059669" text-anchor="middle">Komponen bisa dicopot/ganti</text>
    <text x="125" y="370" font-family="'Segoe UI', Arial" font-size="11" fill="#059669" text-anchor="middle">tanpa merusak sasis utama.</text>
  </g>

  <defs>
    <marker id="arrowred" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
  </defs>

  <!-- Footer -->
  <text x="400" y="580" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">© Python Knowledge Universe - Bab 10: Composition vs Inheritance</text>
</svg>