<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Built-in Functions visual map</title>
  <desc id="desc">Chapter map for Built-in Functions with chapter-specific learning flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <circle cx="95" cy="95" r="68" fill="#ffffff" opacity="0.75"/>
  <circle cx="1120" cy="615" r="92" fill="#ffffff" opacity="0.45"/>

  <text x="70" y="95" font-size="54" font-family="Segoe UI Emoji, Segoe UI Symbol, Segoe UI">🛠️</text>
  <text x="155" y="86" font-size="40" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial">Built-in Functions</text>
  <text x="156" y="122" font-size="20" fill="#334155" font-family="Segoe UI, Arial">CORE-01-13 • Visual Learning Flow</text>

  <g filter="url(#shadow)">
    <rect x="80" y="210" rx="22" ry="22" width="300" height="230" fill="url(#cardA)"/>
    <rect x="450" y="210" rx="22" ry="22" width="300" height="230" fill="url(#cardB)"/>
    <rect x="820" y="210" rx="22" ry="22" width="300" height="230" fill="url(#cardA)"/>
  </g>

  <text x="110" y="270" font-size="24" fill="#ffffff" font-family="Segoe UI Emoji, Segoe UI Symbol, Segoe UI">1️⃣  Built-in Group</text>
  <text x="480" y="270" font-size="24" fill="#ffffff" font-family="Segoe UI Emoji, Segoe UI Symbol, Segoe UI">2️⃣  Data Input</text>
  <text x="850" y="270" font-size="24" fill="#ffffff" font-family="Segoe UI Emoji, Segoe UI Symbol, Segoe UI">3️⃣  Transform/Aggregate</text>

  <text x="110" y="315" font-size="17" fill="#e2e8f0" font-family="Segoe UI, Arial">Kelompok fungsi: type, iter, math, util.</text>
  <text x="480" y="315" font-size="17" fill="#e2e8f0" font-family="Segoe UI, Arial">Data dikirim ke fungsi bawaan.</text>
  <text x="850" y="315" font-size="17" fill="#e2e8f0" font-family="Segoe UI, Arial">Hasil transformasi/agregasi dipakai lanjut.</text>

  <line x1="380" y1="325" x2="450" y2="325" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="750" y1="325" x2="820" y2="325" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="80" y="500" width="1040" height="120" rx="18" ry="18" fill="#ffffff" opacity="0.92"/>
  <text x="115" y="548" font-size="24" fill="#0f172a" font-family="Segoe UI Emoji, Segoe UI Symbol, Segoe UI">🎯 Learning Target</text>
  <text x="115" y="585" font-size="18" fill="#334155" font-family="Segoe UI, Arial">Setelah bab ini, pembaca bisa memanfaatkan fungsi bawaan Python secara efektif.</text>

  <text x="1010" y="655" font-size="16" fill="#64748b" font-family="Segoe UI, Arial">Python Knowledge Universe</text>
</svg>
